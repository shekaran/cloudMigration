name: lift-and-shift-vmware
display_name: "VMware Lift & Shift to IBM Cloud VPC"
description: >
  Migrate VMware VMs directly to IBM Cloud VPC instances with minimal
  changes. Preserves OS, applications, and data as-is.
version: "1.0"
category: lift_and_shift
source_platform: vmware
target_platform: ibm_vpc

parameters:
  adapter: vmware
  skip_validation: false
  dry_run: false
  strategy: lift_and_shift
  sync_mode: incremental
  parallel_sync: true
  max_concurrent_syncs: 4
  continuous_sync: true
  convergence_threshold_mb: 50
  max_downtime_seconds: 300

steps:
  - name: discover
    description: "Discover VMware environment"
    action: discover
    params:
      adapter: "{{ adapter }}"

  - name: validate
    description: "Run pre-migration validation checks"
    action: validate
    params:
      skip_on_error: "{{ skip_validation }}"

  - name: plan
    description: "Generate migration plan and Terraform"
    action: plan
    params:
      adapter: "{{ adapter }}"

  - name: execute
    description: "Execute the full migration pipeline"
    action: execute
    params:
      adapter: "{{ adapter }}"
      skip_validation: "{{ skip_validation }}"
      dry_run: "{{ dry_run }}"

prerequisites:
  - "VMware vCenter credentials configured"
  - "IBM Cloud API key with VPC permissions"
  - "Network connectivity between source and target"
  - "Sufficient VPC quotas for target instances"

estimated_duration: "2-8 hours depending on data volume"
risk_level: low
